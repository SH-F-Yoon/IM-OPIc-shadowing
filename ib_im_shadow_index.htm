<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오픽승혜쌤 쉐도잉 · 입문반</title>
<style>
  :root{
    --navy:#1b3a64; --navy2:#27508a; --red:#c0392b; --bg:#f4f6f9;
    --card:#ffffff; --line:#e3e8ef; --ink:#1d2733; --sub:#6b7785;
    --hi:#fdeaa8; --hiInk:#7a5b00; --play:#1b8a5a; --kobg:#eef3fb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",
      "Noto Sans KR",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.55;
    padding-bottom:140px;
  }
  header{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(135deg,var(--navy),var(--navy2));
    color:#fff; padding:12px 16px 10px;
    box-shadow:0 2px 10px rgba(0,0,0,.12);
  }
  header .ch{font-size:11px; opacity:.85; letter-spacing:.5px;}
  header h1{font-size:17px; margin:2px 0 0; font-weight:800;}
  header .sub{font-size:12px; opacity:.85; margin-top:3px;}
  .chtabs{display:flex; flex-wrap:wrap; gap:7px; overflow-x:visible; padding:9px 12px;
    background:#fff; border-bottom:1px solid var(--line);
    position:sticky; top:60px; z-index:22; -webkit-overflow-scrolling:touch;}
  .chtabs::-webkit-scrollbar{display:none;}
  .chtab{flex:0 0 auto; border:1.5px solid var(--line); background:#fff;
    color:var(--sub); border-radius:20px; padding:7px 14px; font-size:13px;
    font-weight:800; white-space:nowrap; cursor:pointer;}
  .chtab small{font-size:10px; display:block; opacity:.7; font-weight:700;}
  .chtab.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .settabs{display:flex; gap:6px; overflow-x:auto; padding:8px 12px;
    background:var(--bg); border-bottom:1px solid var(--line);
    position:sticky; top:108px; z-index:21; -webkit-overflow-scrolling:touch;}
  .settabs::-webkit-scrollbar{display:none;}
  .settab{flex:0 0 auto; border:1.5px solid var(--line); background:#fff;
    color:var(--sub); border-radius:16px; padding:6px 11px; font-size:12px;
    font-weight:700; white-space:nowrap; cursor:pointer;}
  .settab .ty{font-size:9.5px; display:block; opacity:.75; font-weight:700; color:var(--red);}
  .settab.active{background:#fff; color:var(--navy); border-color:var(--navy);
    box-shadow:0 0 0 1.5px var(--navy) inset;}
  main{padding:14px 12px 0; max-width:680px; margin:0 auto;}
  .qhead{background:#fff; border:1px solid var(--line); border-left:5px solid var(--red);
    border-radius:12px; padding:13px 14px; margin-bottom:12px;}
  .qhead .badge{display:inline-block; font-size:11px; font-weight:800; color:#fff;
    background:var(--red); padding:2px 9px; border-radius:6px; margin-bottom:7px;}
  .qhead h2{font-size:16px; margin:0 0 6px; color:var(--navy); font-weight:800;}
  .qhead .qen{font-size:13px; color:var(--sub); font-style:italic; line-height:1.5;}
  .blocklabel{display:inline-block; background:var(--navy); color:#fff;
    font-size:12px; font-weight:800; padding:4px 12px; border-radius:6px;
    margin:14px 0 8px;}
  .blocklabel.rp{background:var(--red);}
  .sent{display:flex; align-items:flex-start; gap:10px; background:var(--card);
    border:1px solid var(--line); border-radius:12px; padding:11px 12px; margin-bottom:9px;
    transition:border-color .15s, box-shadow .15s, background .15s;}
  .sent.active{border-color:var(--navy); box-shadow:0 0 0 2px rgba(27,58,100,.15);
    background:#fbfdff;}
  .sent .play{flex:0 0 auto; width:38px; height:38px; border-radius:50%;
    border:none; background:var(--navy); color:#fff; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; margin-top:1px;}
  .sent.active .play{background:var(--play);}
  .sent .txt{flex:1; padding-top:2px; cursor:pointer;}
  .sent .en{font-size:15.5px; line-height:1.6;}
  .sent .ih{display:inline-block; background:var(--navy); color:#fff; font-size:10px;
    font-weight:800; padding:1px 5px; border-radius:4px; margin-right:5px; vertical-align:1px;}
  mark{background:var(--hi); color:var(--hiInk); padding:0 2px; border-radius:3px; font-weight:700;}
  .kohint{font-size:11.5px; color:var(--sub); margin-top:5px; user-select:none;}
  .ko{display:none; margin-top:6px; font-size:14px; color:var(--navy);
    background:var(--kobg); border-radius:8px; padding:8px 10px; line-height:1.55;}
  .sent.show-ko .ko{display:block;}
  .num{flex:0 0 auto; font-size:11px; color:var(--sub); width:18px; text-align:right;
    margin-top:11px; font-weight:700;}
  .tip{font-size:12px; color:var(--sub); text-align:center; margin:18px 8px 6px; line-height:1.6;}
  .bar{position:fixed; left:0; right:0; bottom:0; z-index:40;
    background:#fff; border-top:1px solid var(--line);
    box-shadow:0 -3px 14px rgba(0,0,0,.08); padding:9px 12px 12px;}
  .bar .inner{max-width:680px; margin:0 auto;}
  .bar .btns{display:flex; gap:8px; margin-bottom:8px;}
  .bar button.main{flex:1; border:none; border-radius:10px; padding:12px;
    font-size:14px; font-weight:800; cursor:pointer;}
  .bar .playall{background:var(--play); color:#fff;}
  .bar .stop{background:#eef1f5; color:var(--ink); flex:0 0 90px;}
  .bar .opts{display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    font-size:12px; color:var(--sub);}
  .bar .opts label{display:flex; align-items:center; gap:5px;}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden;}
  .seg button{border:none; background:#fff; padding:5px 8px; font-size:12px; font-weight:700;
    color:var(--sub); cursor:pointer;}
  .seg button.on{background:var(--navy); color:#fff;}
  @media(min-width:500px){ header h1{font-size:19px;} }
</style>
</head>
<body>
<header>
  <div class="ch">오픽승혜쌤 쉐도잉 · 입문반 ☕</div>
  <h1 id="hTitle">입문반 (IM2 / IM3)</h1>
  <div class="sub">문장별 듣고 따라 말하기 (Shadowing)</div>
</header>

<div class="chtabs" id="chtabs"></div>
<div class="settabs" id="settabs"></div>
<main id="main"></main>

<div class="bar">
  <div class="inner">
    <div class="btns">
      <button class="main playall" id="playAll">▶ 이 항목 전체 따라읽기</button>
      <button class="main stop" id="stopBtn">■ 정지</button>
    </div>
    <div class="opts">
      <label>속도
        <span class="seg" id="rateSeg">
          <button data-r="0.6">0.6x</button>
          <button data-r="0.7" class="on">0.7x</button>
          <button data-r="0.85">0.85x</button>
          <button data-r="1">1.0x</button>
        </span>
      </label>
      <label>따라읽기 쉼
        <span class="seg" id="gapSeg">
          <button data-g="0.8">짧게</button>
          <button data-g="1.2" class="on">보통</button>
          <button data-g="1.8">길게</button>
        </span>
      </label>
    </div>
  </div>
</div>

<script>
/* =========================================================================
   ▶ 입문반 수정 안내 (공유자 전용)
   - 구조: CHAPTERS → 챕터 → sets(세부 항목) → blocks → s(문장)
   - 각 문장은 ["영어", "한국어 뜻"] 형태. 강조: [[ ]] 노란 하이라이트, {IH} = IM3 뱃지,
     ___ 는 화면엔 보이되 음성은 건너뜀.
   ========================================================================= */
const CHAPTERS = [

 /* ===================== CHAPTER 1 · 자기소개 ===================== */
 {ch:"CH1", chTitle:"자기소개", sets:[

  {ty:"묘사", title:"자기소개",
   qen:"Let's start the interview. Tell me a little bit about yourself.",
   blocks:[
    {label:"답변", s:[
     ["Hi, I'm ___.","안녕하세요, 저는 ___이에요."],
     ["I'm currently looking for a job, and I graduated from ___ University.","저는 지금 구직 중이고, ___ 대학교를 졸업했어요."],
     ["My favorite food is ___, [[which is]] ___.","제가 가장 좋아하는 음식은 ___인데, ___이에요."],
     ["{IH} [[I think]] I'm a ___ person.","제 생각엔 저는 ___한 사람이에요."],
     ["I'm [[quite]] ___, ___. I usually spend time hanging out with my friends.","저는 꽤 ___하고 ___해요. 보통 친구들과 어울리며 시간을 보내요."]]}
   ]}
 ]},

 /* ===================== CHAPTER 2 · 친구·이웃 ===================== */
 {ch:"CH2", chTitle:"친구 / 이웃", sets:[

  {ty:"묘사", title:"이웃 묘사",
   qen:"Tell me about one of your neighbors. What are they like?",
   blocks:[
    {label:"답변", s:[
     ["Well, my neighbor is friendly. [[We've been friends for a long time]].","음, 제 이웃은 친절해요. 우리는 오랫동안 친구였어요."],
     ["Actually, we met when she first moved next door.","사실, 그녀가 옆집에 처음 이사 왔을 때 만났어요."],
     ["You know, we [[became friends]] fast because we [[have so much in common]]. We both like ___, ___ and ___.","있잖아요, 우리는 공통점이 많아서 빨리 친구가 됐어요. 우리 둘 다 ___, ___, ___을 좋아해요."],
     ["Honestly, I like her because she always [[stays positive]] and cheers me up.","솔직히, 그녀가 항상 긍정적이고 저를 응원해줘서 좋아해요."],
     ["{IH} I feel really lucky to have such a wonderful neighbor.","이렇게 멋진 이웃이 있어서 정말 운이 좋다고 느껴요."],
     ["{IH} We also spend time together and enjoy each other's company.","우리는 함께 시간을 보내며 서로의 동행을 즐겨요."]]}
   ]},

  {ty:"RP", title:"Ava 이웃 물어보기",
   qen:"15. I also have close neighbors. Ask me 3 or 4 questions about my neighbor.",
   rp:true,
   blocks:[
    {label:"질문", s:[
     ["Oh! You also have neighbors, that's amazing! What is his or her name?","오! 당신도 이웃이 있군요, 멋져요! 그분 이름이 뭐예요?"],
     ["So, how's your neighbor's personality? Is he or she outgoing?","그래서, 이웃 성격은 어때요? 외향적인가요?"],
     ["{IH} How long have you two known each other? When did you first meet?","두 분은 서로 안 지 얼마나 됐어요? 언제 처음 만났어요?"],
     ["Also, do you have any memorable experiences with your neighbor?","또, 이웃과 기억에 남는 경험이 있어요?"],
     ["{IH} What do you usually do when you spend time together?","함께 시간을 보낼 때 보통 뭘 해요?"],
     ["I think this is all I want to ask.","이게 제가 묻고 싶은 전부인 것 같아요."]]}
   ]}
 ]},

 /* ===================== CHAPTER 3 · 동네 ===================== */
 {ch:"CH3", chTitle:"동네", sets:[

  {ty:"묘사", title:"동네(장소) 묘사",
   qen:"I would like to know about your neighborhood. What does it look like? Please describe it in as much detail as possible.",
   blocks:[
    {label:"답변", s:[
     ["Well, my town is called ___. [[I've been living]] here for 10 years.","음, 우리 동네는 ___라고 해요. 저는 여기 10년째 살고 있어요."],
     ["Honestly, my neighborhood is peaceful and quiet, which I really enjoy.","솔직히, 우리 동네는 평화롭고 조용한데, 저는 그게 정말 좋아요."],
     ["Also, there are ___ nearby / [[within walking distance]].","또, 근처에 / 도보 거리 내에 ___이 있어요."],
     ["{IH} For example, there are parks, cafes, and convenience stores.","예를 들어, 공원, 카페, 편의점이 있어요."],
     ["{IH} It is one of my favorite things about living here.","그게 여기 사는 것에서 제가 가장 좋아하는 점 중 하나예요."],
     ["So, I usually buy coffee at a coffee shop [[on my way to work]].","그래서, 저는 보통 출근길에 카페에서 커피를 사요."],
     ["Also, I take the subway to work, and it only takes about 20 minutes.","또, 지하철로 출근하는데, 20분밖에 안 걸려요."],
     ["It is busy during the rush hour.","출퇴근 시간엔 붐벼요."],
     ["You know, I like living in this town.","있잖아요, 저는 이 동네에 사는 게 좋아요."],
     ["{IH} The convenience stores and cafes make my daily life much easier.","편의점과 카페가 제 일상을 훨씬 편하게 해줘요."],
     ["{IH} Overall, I am really happy living here and would not want to move.","전체적으로, 저는 여기 사는 게 정말 행복하고 이사 가고 싶지 않아요."]]}
   ]},

  {ty:"경험", title:"만능1 - 누구 만남",
   qen:"Please tell me about a memorable experience you have had in your neighborhood. When and where did it occur, and what happened?",
   blocks:[
    {label:"답변", s:[
     ["Actually, a memorable experience happened not a while ago.","사실, 기억에 남는 경험이 최근에 있었어요."],
     ["So, last weekend, I met my ex in my neighborhood.","그래서, 지난 주말, 동네에서 전 애인을 만났어요."],
     ["You know, I went for a walk to [[clear my head]].","있잖아요, 생각을 정리하려고 산책을 나갔어요."],
     ["When I walked outside, I saw someone. Guess who?","밖에 나가 걸을 때, 누군가를 봤어요. 누구였게요?"],
     ["My ex was walking [[toward me]].","전 애인이 저를 향해 걸어오고 있었어요."],
     ["{IH} I stopped walking. I did not know what to do.","저는 걸음을 멈췄어요. 어떻게 해야 할지 몰랐어요."],
     ["Honestly, [[I wasn't sure if I should]] say hello or just keep walking.","솔직히, 인사를 해야 할지 그냥 계속 걸어야 할지 고민됐어요."],
     ["{IH} But I took a breath and decided to say hello.","하지만 숨을 한번 고르고 인사하기로 했어요."],
     ["So, [[in the end]], we stopped and had a talk.","그래서, 결국, 우리는 멈춰서 이야기를 나눴어요."],
     ["It was [[weird]] and [[awkward]]. But it was nice to have a talk.","이상하고 어색했어요. 하지만 이야기 나눠서 좋았어요."]]}
   ]},

  {ty:"경험", title:"만능2 - 비",
   qen:"Tell me about another memorable experience you had in your neighborhood.",
   blocks:[
    {label:"답변", s:[
     ["Actually, a memorable experience happened a few months ago.","사실, 기억에 남는 경험이 몇 달 전에 있었어요."],
     ["So, I was outside with my friends, and it suddenly started to rain.","그래서, 친구들과 밖에 있었는데, 갑자기 비가 오기 시작했어요."],
     ["You know, we didn't have umbrellas, so we ran to a [[nearby coffee shop]].","있잖아요, 우리는 우산이 없어서, 근처 카페로 뛰어갔어요."],
     ["{IH} When we got there, we were very wet, but we laughed a lot.","도착했을 때, 흠뻑 젖었지만, 많이 웃었어요."],
     ["Also, we ordered hot drinks and watched the rain.","또, 따뜻한 음료를 시키고 비를 구경했어요."],
     ["It was cold, but we had fun memories.","추웠지만, 즐거운 추억을 만들었어요."],
     ["{IH} Looking back, it turned into one of my favorite memories.","돌이켜보면, 제가 가장 좋아하는 추억 중 하나가 됐어요."],
     ["Honestly, I had a really [[relaxing time]] with my friends.","솔직히, 친구들과 정말 편안한 시간을 보냈어요."]]}
   ]}
 ]},

 /* ===================== CHAPTER 4 · 집·집안일 ===================== */
 {ch:"CH4", chTitle:"집 / 집안일", sets:[

  {ty:"묘사", title:"집(장소) 묘사",
   qen:"Please tell me about your house. What's your favorite room? What does it look like?",
   blocks:[
    {label:"답변", s:[
     ["Well, I live alone in a studio apartment.","음, 저는 원룸에서 혼자 살아요."],
     ["Actually, it is small but cozy. It is sunny and warm too.","사실, 작지만 아늑해요. 햇빛도 잘 들고 따뜻해요."],
     ["So, it feels really nice during the day.","그래서, 낮에 정말 기분이 좋아요."],
     ["Also, I don't have many spaces or furniture in my home.","또, 집에 공간이나 가구가 많지 않아요."],
     ["There's just a coffee table and a bed.","커피 테이블이랑 침대만 있어요."],
     ["I also have a washing machine and a vacuum cleaner.","세탁기랑 청소기도 있어요."],
     ["{IH} When I have free time, I usually watch Netflix in my bed.","여유 시간이 있으면, 보통 침대에서 넷플릭스를 봐요."],
     ["Honestly, it's my favorite way to relax.","솔직히, 그게 제가 가장 좋아하는 휴식 방법이에요."],
     ["{IH} I like to keep my room clean and simple, so it does not feel messy.","방을 깨끗하고 단순하게 유지하는 걸 좋아해서, 지저분해 보이지 않아요."]]}
   ]},

  {ty:"경험", title:"최근 집에 준 변화",
   qen:"Have you made any changes to your house recently? What did you change, and are you satisfied with it?",
   blocks:[
    {label:"답변", s:[
     ["Actually, I recently bought some new lighting, and I really like it.","사실, 최근에 새 조명을 샀는데, 정말 마음에 들어요."],
     ["You know, I wanted to change the feel of my room, and I finally did it.","있잖아요, 방 분위기를 바꾸고 싶었는데, 드디어 해냈어요."],
     ["It [[makes]] my home [[look]] more cozy and comfy.","그게 우리 집을 더 아늑하고 편안해 보이게 해요."],
     ["Honestly, I think lighting can change the mood.","솔직히, 조명이 분위기를 바꿀 수 있다고 생각해요."],
     ["{IH} A small change like that can make such a big difference.","그런 작은 변화가 큰 차이를 만들 수 있어요."],
     ["I bought it a few weeks ago. I went to Ikea with my friend.","몇 주 전에 샀어요. 친구와 이케아에 갔어요."],
     ["Also, it was only 20 dollars, and I really liked it.","또, 20달러밖에 안 했는데, 정말 마음에 들었어요."],
     ["{IH} I think changing the mood of a room is really important.","방 분위기를 바꾸는 게 정말 중요하다고 생각해요."]]}
   ]},

  {ty:"묘사", title:"집에서 하는 것 / 루틴 (집안일)",
   qen:"What do you usually do at home? How is your typical routine at home?",
   blocks:[
    {label:"답변", s:[
     ["Well, I live alone, so I have to do a lot of house chores.","음, 저는 혼자 살아서, 집안일을 많이 해야 해요."],
     ["So, I do the dishes everyday, and vacuum the floor on weekends.","그래서, 매일 설거지를 하고, 주말엔 바닥 청소기를 돌려요."],
     ["Also, I do the laundry when I have time.","또, 시간이 있을 때 빨래를 해요."],
     ["{IH} I usually spend a few hours on weekends to finish all my chores.","보통 주말에 몇 시간을 들여 집안일을 다 끝내요."],
     ["You know, I usually take out the trash on weekends.","있잖아요, 보통 주말에 쓰레기를 내놔요."],
     ["I recycle paper, plastic, metal and so on.","종이, 플라스틱, 금속 등을 재활용해요."],
     ["These days, I'm really busy, so I do house chores only on weekends.","요즘, 정말 바빠서, 집안일을 주말에만 해요."],

     ["So it's a great place to work out.","그래서 운동하기 좋은 곳이에요."],
     ["There's also some outdoor exercise equipment.","야외 운동 기구도 있어요."],
     ["So, I stretch before starting.","그래서, 시작 전에 스트레칭해요."],
     ["Also, in the evening, there are many people jogging or biking.","또, 저녁엔 조깅하거나 자전거 타는 사람들이 많아요."],
     ["Some people walk their dogs.","어떤 사람들은 개를 산책시켜요."],
     ["On weekends, the park gets crowded because many families come for picnics.","주말엔, 소풍 오는 가족이 많아서 공원이 붐벼요."],
     ["Sometimes there are food trucks and small concerts too.","가끔 푸드트럭과 작은 공연도 있어요."],
     ["{IH} It is very lively and I love the energy there.","아주 활기차고 그곳의 에너지가 좋아요."]]}
   ]},

  {ty:"묘사", title:"루틴 / 준비 / 안전 수칙",
   qen:"What do you usually do before, during, and after exercising? What do you do to stay safe and avoid injuries?",
   blocks:[
    {label:"답변", s:[
     ["Well, there's exercise equipment in the park.","음, 공원에 운동 기구가 있어요."],
     ["First, I stretch my arms and legs.","먼저, 팔과 다리를 스트레칭해요."],
     ["{IH} I think warming up is really important to avoid injuries.","부상을 피하려면 준비운동이 정말 중요한 것 같아요."],
     ["Then, while working out, I listen to music.","그다음, 운동하면서 음악을 들어요."],
     ["Actually, I usually listen to K-pop because it's fun and gives me energy.","사실, 재밌고 힘이 나서 보통 K-pop을 들어요."],
     ["Then, after working out, I drink a lot of water.","그다음, 운동 후에 물을 많이 마셔요."],
     ["Because it's too hot these days.","요즘 너무 더워서요."],
     ["{IH} If I have time, I sit on a bench and cool down for a few minutes.","시간이 있으면, 벤치에 앉아 몇 분간 식혀요."]]}
   ]},

  {ty:"묘사", title:"자전거 묘사",
   qen:"There are many different types of bicycles. Please describe your bicycle in detail. What does it look like? Where did you get it?",
   blocks:[
    {label:"답변", s:[
     ["Well, I don't have a bike now.","음, 지금은 자전거가 없어요."],
     ["I used to have a bike when I was younger, but I sold it a few years ago.","어렸을 땐 자전거가 있었는데, 몇 년 전에 팔았어요."],
     ["These days, I usually ride a public bike, called Ttareungi in Korea.","요즘, 한국에서 따릉이라는 공공 자전거를 타요."],
     ["{IH} It is green and you can find it everywhere. It is very convenient.","초록색이고 어디서나 찾을 수 있어요. 정말 편리해요."],
     ["It's really cheap. It is only a dollar per hour.","정말 저렴해요. 시간당 1달러밖에 안 해요."],
     ["{IH} I think it's a great option if you don't want to buy a bike.","자전거를 사고 싶지 않다면 좋은 선택인 것 같아요."]]}
   ]},

  {ty:"경험", title:"문제가 생긴 경험 (비 와서 미끄러짐)",
   qen:"Describe a memorable experience you had while exercising or cycling. When did it occur? Who were you with? What happened?",
   blocks:[
    {label:"답변", s:[
     ["Actually, I was riding a bike last weekend.","사실, 지난 주말에 자전거를 탔어요."],
     ["I was there with my friend, and we planned to work out together.","친구와 함께 있었고, 같이 운동하기로 했어요."],
     ["However, it suddenly started to rain.","그런데, 갑자기 비가 오기 시작했어요."],
     ["{IH} We were not ready for that at all. It came out of nowhere.","전혀 준비가 안 됐었어요. 난데없었어요."],
     ["Because the ground was wet, I slipped and hurt my leg.","땅이 젖어서, 미끄러져 다리를 다쳤어요."],
     ["I didn't bring any medicine or bandage, so I just rested for a while.","약이나 밴드를 안 가져와서, 잠깐 쉬었어요."],
     ["{IH} My friend helped me and stayed with me until I felt better.","친구가 도와주고 나아질 때까지 함께 있어줬어요."],
     ["It was painful, but still, we had fun.","아팠지만, 그래도, 재밌었어요."],
     ["In the end, it became a memorable experience.","결국, 기억에 남는 경험이 됐어요."]]}
   ]},

  {ty:"경험", title:"운동을 즐기게 된 계기",
   qen:"When did you first become interested in exercising? Why did you start? Has your physical condition changed?",
   blocks:[
    {label:"답변", s:[
     ["Well, when I was 5 or 6, my dad taught me how to ride a bike.","음, 5살이나 6살 때, 아빠가 자전거 타는 법을 가르쳐 주셨어요."],
     ["Back then, I wasn't very interested in biking.","그땐, 자전거에 별로 관심이 없었어요."],
     ["{IH} But things changed, and now I really enjoy it.","하지만 상황이 바뀌어서, 지금은 정말 즐겨요."],
     ["When I was in college, I went out a lot with my friends.","대학 때, 친구들과 자주 놀러 다녔어요."],
     ["As a result, I gained 10 kilos! My clothes didn't fit.","그 결과, 10kg이나 쪘어요! 옷이 안 맞았어요."],
     ["{IH} I was really shocked when I saw the number on the scale.","체중계 숫자를 봤을 때 정말 충격받았어요."],
     ["I wanted to lose weight, so I started working out.","살을 빼고 싶어서, 운동을 시작했어요."],
     ["At first, it was very difficult, and I felt drained.","처음엔, 정말 힘들었고, 진이 빠졌어요."],
     ["But now, it's easier and I lost 5 kilos.","하지만 지금은, 더 쉬워졌고 5kg을 뺐어요."],
     ["{IH} Also, my mood got much better. Working out changed my life.","또, 기분도 훨씬 좋아졌어요. 운동이 제 삶을 바꿨어요."]]}
   ]},

  {ty:"RP", title:"자전거 빌리기",
   qen:"You want to rent a bike. Call the shop and ask 3 or 4 questions about renting a bike.",
   rp:true,
   blocks:[
    {label:"대화", s:[
     ["Hello, I'd like to rent a bike.","안녕하세요, 자전거를 빌리고 싶어요."],
     ["Actually, I need it for this Saturday. Maybe for six hours.","사실, 이번 토요일에 필요해요. 6시간 정도요."],
     ["{IH} I'm planning to go to Han River Park with my friends.","친구들과 한강공원에 갈 계획이에요."],
     ["By the way, how much is it per hour?","그런데, 시간당 얼마예요?"],
     ["10 dollars? Oh, that's a bit expensive.","10달러요? 아, 좀 비싸네요."],
     ["So, do you have any discounts for longer rentals?","그래서, 장기 대여 할인이 있나요?"],
     ["{IH} Ok, it's still expensive, but I'll rent it because I really need it.","알겠어요, 그래도 비싸지만, 정말 필요하니 빌릴게요."]]}
   ]},

  {ty:"RP", title:"자전거가 품절인 상황 (대안 제시)",
   qen:"The bike you wanted to rent is not available. Explain why you need it and give 2 or 3 suggestions.",
   rp:true,
   blocks:[
    {label:"대화", s:[
     ["Oh, what? I can't rent the bike?","아, 뭐라고요? 자전거를 못 빌려요?"],
     ["Actually, I really need it. I'm going to Han River Park this Saturday.","사실, 정말 필요해요. 이번 토요일에 한강공원에 가요."],
     ["{IH} My friends are all counting on me. This is a big problem.","친구들이 다 저만 믿고 있어요. 이거 큰일이에요."],
     ["Well, then is there a similar bike instead?","음, 그럼 대신 비슷한 자전거가 있나요?"],
     ["Maybe a different model or style?","다른 모델이나 스타일은요?"],
     ["Hmm, what about different colors?","음, 다른 색은 어때요?"],
     ["I don't really like that color. It's too bright for me.","그 색은 별로예요. 너무 밝아요."],
     ["{IH} Is there anything in a darker color? I prefer dark colors.","더 어두운 색은 없나요? 어두운 색을 선호해요."],
     ["Then, what about on Sunday instead? Can I book a bike for Sunday?","그럼, 대신 일요일은 어때요? 일요일에 자전거 예약할 수 있나요?"],
     ["OK, then I'll rent it for Sunday instead. Thank you.","알겠어요, 그럼 대신 일요일에 빌릴게요. 감사합니다."]]}
   ]}
 ]},

 /* ===================== CHAPTER 11 · 건강 ===================== */
 {ch:"CH11", chTitle:"건강", sets:[

  {ty:"묘사", title:"건강한 사람 묘사",

   blocks:[
    {label:"답변", s:[
     ["Well, my bestie ___ is healthy.","음, 제 절친 ___는 건강해요."],
     ["He never drinks, and he quit smoking a few years ago.","그는 술을 전혀 안 마시고, 몇 년 전에 담배를 끊었어요."],
     ["{IH} I really respect him for that. It takes a lot of will power.","그 점을 정말 존경해요. 엄청난 의지가 필요하거든요."],
     ["He works out everyday and eats many healthy foods.","매일 운동하고 건강식을 많이 먹어요."],
     ["He usually goes to the gym early in the morning.","보통 아침 일찍 헬스장에 가요."],
     ["Actually, he wakes up really early, around 5 or 6 a.m.","사실, 새벽 5시나 6시쯤 정말 일찍 일어나요."],
     ["{IH} He has a healthy lifestyle, and he is always full of energy.","건강한 생활 습관이 있고, 항상 에너지가 넘쳐요."]]}
   ]},

  {ty:"묘사", title:"건강 유지 방법",
   qen:"Is there anything special that you do to keep healthy? Tell me what you do and explain why you do it.",
   blocks:[
    {label:"답변", s:[
     ["Well, as for me, I also try to stay healthy.","음, 저도 건강을 유지하려고 노력해요."],
     ["I usually go in the evening, because it's too hot during the day.","보통 낮엔 너무 더워서 저녁에 가요."],
     ["I usually go around 7 p.m. after work.","보통 퇴근 후 저녁 7시쯤 가요."],
     ["I go for a jog 3 times a week.","일주일에 3번 조깅해요."],
     ["Also, each time, I work out at least one hour.","또, 매번, 최소 한 시간은 운동해요."],
     ["{IH} Working out has become a very important part of my day.","운동은 제 하루의 아주 중요한 부분이 됐어요."],

     ["Also, I never smoke. And I don't go out anymore.","또, 담배를 전혀 안 피워요. 그리고 더 이상 놀러 안 나가요."],
     ["{IH} I also try to eat healthy food every day, like fruit and vegetables.","또 매일 과일과 채소 같은 건강식을 먹으려고 해요."],
     ["I think healthy food is important too. Like vitamin C, D, omega-3.","건강식도 중요한 것 같아요. 비타민 C, D, 오메가-3 같은 거요."]]}
   ]},

  {ty:"묘사", title:"건강한 음식 (한국 음식)",
   qen:"Tell me about healthy food you like to eat. Do you know how to make it? Please describe it in detail.",
   blocks:[
    {label:"답변", s:[
     ["Well, I think the most famous Korean dish is Bibimbap.","음, 가장 유명한 한국 음식은 비빔밥인 것 같아요."],
     ["Actually, you can put many things into Bibimbap.","사실, 비빔밥엔 여러 가지를 넣을 수 있어요."],
     ["There's rice, sprouts, cucumber, cabbage, lettuce, and red pepper paste.","밥, 콩나물, 오이, 양배추, 양상추, 고추장이 들어가요."],
     ["{IH} It looks really colorful and it is very good for your health.","아주 알록달록하고 건강에 정말 좋아요."],
     ["Honestly, I like Bibimbap because it is healthy and colorful.","솔직히, 비빔밥이 건강하고 알록달록해서 좋아해요."],
     ["Also, it is easy to make.","또, 만들기 쉬워요."],
     ["I put everything together and just mix it.","다 넣고 그냥 비비면 돼요."],
     ["{IH} It takes less than 10 minutes. It is my go-to home meal.","만드는 데 10분도 안 걸려요. 제 단골 집밥이에요."],
     ["It tasted great.","맛이 좋았어요."]]}
   ]},

  {ty:"경험", title:"건강에 문제가 생긴 경험 (코로나)",
   qen:"Tell me about a health problem you or someone close to you had. What were the symptoms? What did you do to get over it?",
   blocks:[
    {label:"답변", s:[
     ["Actually, last year, I got Covid-19, and it was a really hard time for me.","사실, 작년에 코로나에 걸렸는데, 정말 힘든 시기였어요."],
     ["At first, I had a fever. Then I had a headache.","처음엔, 열이 났어요. 그다음 두통이 있었어요."],
     ["Later, I also had a sore throat and a cough.","나중엔, 목도 아프고 기침도 났어요."],
     ["I went to see the doctor and got tested.","병원에 가서 검사를 받았어요."],
     ["The test result was positive, so I had to stay home and rest.","검사 결과가 양성이라, 집에서 쉬어야 했어요."],

     ["I took the medicine, and drank a lot of water.","약을 먹고, 물을 많이 마셨어요."],
     ["{IH} It was really boring and lonely, but I had no choice.","정말 지루하고 외로웠지만, 어쩔 수 없었어요."],
     ["It was so painful.","정말 괴로웠어요."]]}
   ]}
 ]},

 {ch:"CH12", chTitle:"여행 · 집에서 보내는 휴가", sets:[

   blocks:[

  {ty:"경험", title:"집에서 보낸 최근 휴가",

/* ---------------- STATE ---------------- */
let curCh = 0, curSet = 0, rate = 0.7, gapMul = 1.2;
let voice = null, voices = [];
let playing = false, qIdx = 0, stopFlag = false, audioEl = null;

const chtabsEl = document.getElementById('chtabs');
const settabsEl = document.getElementById('settabs');
const mainEl = document.getElementById('main');

function plain(t){
  return t.replace(/\{IH\}\s*/g,'')
          .replace(/\[\[(.+?)\]\]/g,'$1')
          .replace(/_+/g,' ')
          .replace(/\s{2,}/g,' ')
          .trim();
}
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function html(t){
  let h = esc(t);
  h = h.replace(/\{IH\}\s*/g,'<span class="ih">IM3</span>');
  h = h.replace(/\[\[(.+?)\]\]/g,'<mark>$1</mark>');
  return h;
}

function buildChapterTabs(){
  chtabsEl.innerHTML='';
  CHAPTERS.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='chtab'+(i===curCh?' active':'');
    b.innerHTML='<small>'+c.ch+'</small>'+c.chTitle.split('(')[0].trim();
    b.onclick=()=>{ stopAll(); curCh=i; curSet=0; render(); window.scrollTo(0,0); };
    chtabsEl.appendChild(b);
  });
}
function buildSetTabs(){
  settabsEl.innerHTML='';
  CHAPTERS[curCh].sets.forEach((st,i)=>{
    const b=document.createElement('button');
    b.className='settab'+(i===curSet?' active':'');
    b.innerHTML='<span class="ty">'+st.ty+'</span>'+st.title.split('(')[0].trim();
    b.onclick=()=>{ stopAll(); curSet=i; render(); window.scrollTo(0,0);
      document.querySelector('main').scrollIntoView({block:'start'}); };
    settabsEl.appendChild(b);
  });
}

function render(){
  buildChapterTabs();
  buildSetTabs();
  const c=CHAPTERS[curCh];
  const d=c.sets[curSet];
  document.getElementById('hTitle').textContent=c.ch+' · '+c.chTitle.split('(')[0].trim();
  let h='';
  h+='<div class="qhead"><span class="badge">'+d.ty+' · '+esc(d.title)+'</span>'+
     '<h2>'+esc(d.title)+'</h2><div class="qen">'+esc(d.qen)+'</div></div>';
  let n=0;
  const items=[];
  d.blocks.forEach(bk=>{
    h+='<div class="blocklabel'+(d.rp?' rp':'')+'">'+esc(bk.label)+'</div>';
    bk.s.forEach(pair=>{
      const en=pair[0], ko=pair[1]||'', audio=pair[2]||null;
      const idx=n++;
      items.push({en:plain(en), audio:audio});
      h+='<div class="sent" data-i="'+idx+'">'+
         '<div class="num">'+(idx+1)+'</div>'+
         '<button class="play" aria-label="play">▶</button>'+
         '<div class="txt">'+
           '<div class="en">'+html(en)+'</div>'+
           '<div class="kohint">💬 뜻 보기 ▾</div>'+
           '<div class="ko">'+esc(ko)+'</div>'+
         '</div></div>';
    });
  });
  h+='<div class="tip">💡 ▶ 를 눌러 한 문장씩 듣고 따라 말하세요.<br>'+
     '문장을 누르면 <b>한국어 뜻</b>이 보여요. 아래 <b>전체 따라읽기</b>는 자동 재생이에요.</div>';
  mainEl.innerHTML=h;

  mainEl.querySelectorAll('.sent').forEach(el=>{
    const i=+el.dataset.i;
    el.querySelector('.play').onclick=(ev)=>{ ev.stopPropagation(); stopAll(); speakOne(items[i], el); };
    el.querySelector('.txt').onclick=()=>{
      el.classList.toggle('show-ko');
      const hint=el.querySelector('.kohint');
      hint.textContent = el.classList.contains('show-ko') ? '💬 뜻 닫기 ▴' : '💬 뜻 보기 ▾';
    };
  });
  mainEl._items=items;
}

/* ---------------- SPEECH ---------------- */
function pickVoice(){
  const list = speechSynthesis.getVoices();
  voices = list.filter(v=>/^en(-|_|$)/i.test(v.lang));
  const female=/(samantha|ava|allison|susan|karen|moira|tessa|fiona|serena|veena|zira|aria|jenny|jane|nanc|michelle|sonia|emma|amy|joanna|kendra|salli|nicole|female|woman|girl|google us english)/i;
  const male=/(daniel|alex\b|fred|tom\b|david|mark|guy|george|oliver|arthur|rishi|ryan|male)/i;
  const natural=/(natural|neural|online|enhanced|premium|siri)/i;
  const score=v=>{ const n=v.name.toLowerCase();
    const us=/en[-_]?us/i.test(v.lang);
    const fem=female.test(n) && !male.test(n);
    if(us && fem && natural.test(n)) return 0;
    if(us && fem) return 1;
    if(fem && natural.test(n)) return 2;
    if(fem) return 3;
    if(us) return 5;
    return 8; };
  voices.sort((a,b)=>score(a)-score(b));
  voice = voices[0] || list[0] || null;
}
function ttsUtter(text){
  const u=new SpeechSynthesisUtterance(text);
  if(voice) u.voice=voice;
  u.rate=rate; u.pitch=1.05; u.lang=(voice&&voice.lang)||'en-US';
  return u;
}
function playItem(item, onend){
  if(item.audio){
    try{
      speechSynthesis.cancel();
      audioEl=new Audio(item.audio);
      audioEl.playbackRate=Math.max(0.5,Math.min(1,rate+0.1));
      audioEl.onended=()=>{ audioEl=null; onend&&onend(); };
      audioEl.onerror=()=>{ audioEl=null; const u=ttsUtter(item.en); u.onend=onend; speechSynthesis.speak(u); };
      audioEl.play().catch(()=>{ audioEl=null; const u=ttsUtter(item.en); u.onend=onend; speechSynthesis.speak(u); });
      return;
    }catch(e){}
  }
  const u=ttsUtter(item.en); u.onend=onend; speechSynthesis.speak(u);
}
function highlight(el){
  mainEl.querySelectorAll('.sent.active').forEach(e=>{e.classList.remove('active');
    e.querySelector('.play').textContent='▶';});
  if(el){ el.classList.add('active'); el.querySelector('.play').textContent='❚❚';
    const r=el.getBoundingClientRect();
    if(r.top<150||r.bottom>window.innerHeight-160)
      el.scrollIntoView({behavior:'smooth',block:'center'});
  }
}
function speakOne(item, el){
  stopAudio();
  highlight(el);
  playItem(item, ()=>{ if(!playing) highlight(null); });
}
function wordGap(text){
  const w=text.split(/\s+/).length;
  return Math.max(1400, w*380) * gapMul;
}
function playAll(){
  stopAll();
  playing=true; stopFlag=false; qIdx=0;
  document.getElementById('playAll').textContent='⏸ 재생 중…';
  nextInQueue();
}
function nextInQueue(){
  if(stopFlag) return;
  const items=mainEl._items;
  const cards=mainEl.querySelectorAll('.sent');
  if(qIdx>=items.length){ stopAll(); return; }
  const el=cards[qIdx];
  highlight(el);
  playItem(items[qIdx], ()=>{
    if(stopFlag) return;
    const nextText = (items[qIdx]&&items[qIdx].en)||'';
    setTimeout(()=>{ qIdx++; nextInQueue(); }, wordGap(nextText));
  });
}
function stopAudio(){
  speechSynthesis.cancel();
  if(audioEl){ try{audioEl.pause();}catch(e){} audioEl=null; }
}
function stopAll(){
  stopFlag=true; playing=false;
  stopAudio();
  highlight(null);
  const pa=document.getElementById('playAll');
  if(pa) pa.textContent='▶ 이 항목 전체 따라읽기';
}

/* ---------------- CONTROLS ---------------- */
document.getElementById('playAll').onclick=()=>{ if(playing) stopAll(); else playAll(); };
document.getElementById('stopBtn').onclick=stopAll;
document.getElementById('rateSeg').onclick=e=>{
  if(e.target.dataset.r){ rate=+e.target.dataset.r;
    [...e.currentTarget.children].forEach(b=>b.classList.remove('on'));
    e.target.classList.add('on'); }
};
document.getElementById('gapSeg').onclick=e=>{
  if(e.target.dataset.g){ gapMul=+e.target.dataset.g;
    [...e.currentTarget.children].forEach(b=>b.classList.remove('on'));
    e.target.classList.add('on'); }
};
window.speechSynthesis.onvoiceschanged=pickVoice;
pickVoice();
render();
window.addEventListener('pagehide',stopAll);
</script>
